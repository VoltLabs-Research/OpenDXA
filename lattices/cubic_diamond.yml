# Unique identifier for the lattice.
name: cubic_diamond

# Number of nearest neighbors per atom.
coordination_number: 16

# Relative vectors from the central atom to each of its neighbors.
# These define the ideal local geometry.
neighbor_vectors:
  - [0.25, 0.25, 0.25]
  - [0.25, -0.25, -0.25]
  - [-0.25, -0.25, 0.25]
  - [-0.25, 0.25, -0.25]
  - [0, -0.5, 0.5]
  - [0.5, 0.5, 0]
  - [-0.5, 0, 0.5]
  - [-0.5, 0.5, 0]
  - [0, 0.5, 0.5]
  - [0.5, -0.5, 0]
  - [0.5, 0, 0.5]
  - [0.5, 0, -0.5]
  - [-0.5, -0.5, 0]
  - [0, -0.5, -0.5]
  - [0, 0.5, -0.5]
  - [-0.5, 0, -0.5]
  - [0.25, -0.25, 0.25]
  - [0.25, 0.25, -0.25]
  - [-0.25, 0.25, 0.25]
  - [-0.25, -0.25, -0.25]
